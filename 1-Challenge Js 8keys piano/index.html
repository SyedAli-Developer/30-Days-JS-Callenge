<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js Drum Kit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./images/favicon.png" />
</head>
<body>
    <!-- Keyboard Buttons -->
    <div class="keys">
        <div data-key="65" class="key">
            <kbd>A</kbd>
            <span class="sound">A6</span>
        </div>
        
        <div data-key="83" class="key">
            <kbd>S</kbd>
            <span class="sound">B6</span>
        </div>
        
        <div data-key="68" class="key">
            <kbd>D</kbd>
            <span class="sound">C6</span>
        </div>
        
        <div data-key="70" class="key">
            <kbd>F</kbd>
            <span class="sound">D6</span>
        </div>

        <div data-key="72" class="key">
            <kbd>H</kbd>
            <span class="sound">F6</span>
        </div>

        <div data-key="74" class="key">
            <kbd>J</kbd>
            <span class="sound">G6</span>
        </div>

        <div data-key="75" class="key">
            <kbd>K</kbd>
            <span class="sound">H6</span>
        </div>

        <div data-key="76" class="key">
            <kbd>L</kbd>
            <span class="sound">I6</span>
        </div>
    </div>

    <!-- Audios for playing with JS  -->
    <audio data-key="83" src="./audio/B4.wav"></audio>
    <audio data-key="76" src="./audio/C5.wav"></audio>
    <audio data-key="75" src="./audio/G4.wav"></audio>
    <audio data-key="74" src="./audio/F4.wav"></audio>
    <audio data-key="72" src="./audio/E4.wav"></audio>
    <audio data-key="70" src="./audio/D4.wav"></audio>
    <audio data-key="68" src="./audio/C4.wav"></audio>
    <audio data-key="65" src="./audio/A4.wav"></audio>

    <script src="./app.js"></script>
</body>
</html>
